name: CI

on:
  push:
    branches: [main, release/**, hotfix/**]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality-gates:
    name: quality-gates
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm shellcheck

      - name: Secret scan
        run: python3 scripts/secret_scan.py

      - name: Script lint
        run: shellcheck build.sh test.sh

      - name: Build
        run: ./build.sh

      - name: Full test suite
        run: ./test.sh

      - name: Quick tests
        run: ./quick_tests/run_quick_tests.sh

      - name: Spec tests
        run: ./quick_tests/run_spec_tests.sh

      - name: Prepare artifacts
        run: |
          mkdir -p out
          cp kdx out/kdx
          tar -czf out/examples.tar.gz examples
          sha256sum out/kdx out/examples.tar.gz > out/SHA256SUMS
          cp README.md out/README.md
          if [ -d docs/language ]; then tar -czf out/language-docs.tar.gz docs/language; fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ci-artifacts
          path: out/

  cross-platform-sanity:
    name: cross-platform-sanity
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docs and file sanity
        shell: bash
        run: |
          python3 - <<'PY'
          import pathlib
          required = [
            'README.md',
            'docs/language/reference.md',
            'docs/language/getting-started.md',
            'docs/language/error-codes.md',
            'docs/language/cookbook.md',
            'docs/language/roadmap-compatibility.md',
          ]
          missing = [p for p in required if not pathlib.Path(p).exists()]
          if missing:
            raise SystemExit(f"missing required files: {missing}")
          print('cross-platform sanity: ok')
          PY
